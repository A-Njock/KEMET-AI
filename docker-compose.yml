version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kemet_backend
    restart: always
    environment:
      - PORT=8000
    env_file:
      - .env
    expose:
      - "8000"
    networks:
      - kemet_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_RAG_BACKEND_URL=
    container_name: kemet_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - kemet_network

networks:
  kemet_network:
    driver: bridge
